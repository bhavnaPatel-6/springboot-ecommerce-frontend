<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProductHub - Login</title>
    <link rel="stylesheet" href="login.css">
    
</head>
<body class="login-page">

<div class="login-container">

    <div class="login-left">
        <h1>ProductHub</h1>
        <p>
            Manage Products, Inventory and Users
            with a modern dashboard experience.
        </p>
    </div>

    <div class="login-box">

        <h2>Welcome Back</h2>

        <input
                type="text"
                id="loginUsername"
                placeholder="Username">

        <input
                type="password"
                id="loginPassword"
                placeholder="Password">

        <button
                class="main-btn"
                onclick="loginUser()">
            Login
        </button>

        <div class="divider">
            <span>OR</span>
        </div>

        <h3>Create Account</h3>

        <input
                type="text"
                id="registerUsername"
                placeholder="Username">

        <input
                type="password"
                id="registerPassword"
                placeholder="Password">

        <button
                class="secondary-btn"
                onclick="registerUser()">
            Register
        </button>

    </div>

</div>

<script src="config.js"></script>

<script src="login.js"></script>

</body>
</html>
