<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProductHub Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- NAVBAR -->
    <header class="navbar">

        <div class="logo">
            🛒 ProductHub
        </div>

        <div class="nav-actions">

            <input
                type="text"
                id="searchInput"
                placeholder="Search Products...">

                 <button class="cart-btn" onclick="window.location.href='cart.html'">
        🛒 Cart
        <span id="cartCount">0</span>
    </button>
            <button
                class="add-btn"
                onclick="openModal()">
                + Add Product
            </button>
<button style="background:red;color:white;padding:20px;">
    CART TEST
</button>
            <button
                class="logout-btn"
                onclick="logout()">
                Logout
            </button>

        </div>

    </header>

    <!-- HERO SECTION -->

    <section class="hero">

        <div class="hero-content">

            <h1>Inventory Management Dashboard</h1>

            <p>
                Manage products, inventory, categories
                and stock efficiently from one place.
            </p>

        </div>

    </section>

    <!-- DASHBOARD STATS -->

    <section class="stats">

        <div class="stat-card">
            <h2>Products</h2>
            <p>Manage Inventory</p>
        </div>

        <div class="stat-card">
            <h2>Admin</h2>
            <p>Full Access</p>
        </div>

        <div class="stat-card">
            <h2>Dashboard</h2>
            <p>Control Center</p>
        </div>

    </section>

    <!-- PRODUCTS -->

    <section class="products-section">

        <div class="section-header">

            <h2>
                Product Catalog
            </h2>

        </div>

        <div
            class="container"
            id="products">

        </div>

    </section>

    <!-- ADD / UPDATE PRODUCT MODAL -->

    <div
        class="modal"
        id="productModal">

        <div class="modal-content">

            <h2 id="modalTitle">
                Add Product
            </h2>

            <input
                type="hidden"
                id="productId">

            <input
                type="text"
                id="name"
                placeholder="Product Name">

            <input
                type="text"
                id="description"
                placeholder="Description">

            <input
                type="text"
                id="brand"
                placeholder="Brand">

            <input
                type="number"
                id="price"
                placeholder="Price">

            <input
                type="text"
                id="category"
                placeholder="Category">

            <input
                type="number"
                id="quantity"
                placeholder="Quantity">

            <div class="checkbox-row">

                <label>
                    Available
                </label>

                <input
                    type="checkbox"
                    id="available">

            </div>

            <input
                type="file"
                id="imageFile">

            <div class="modal-buttons">

                <button onclick="saveProduct()">
                    Save
                </button>

                <button onclick="closeModal()">
                    Cancel
                </button>

            </div>

        </div>

    </div>

    <!-- PRODUCT DETAILS MODAL -->

    <div
        class="modal"
        id="detailsModal">

        <div class="details-box">

            <span
                class="close-btn"
                onclick="closeDetails()">
                &times;
            </span>

            <img
                id="detailImage"
                src=""
                alt="Product">

            <h2 id="detailName"></h2>

            <p id="detailBrand"></p>

            <p id="detailDescription"></p>

            <p id="detailPrice"></p>

            <p id="detailCategory"></p>

            <p id="detailQuantity"></p>

            <p id="detailAvailability"></p>

        </div>

    </div>

   <script src="config.js"></script>
<script src="script.js"></script>

</body>

</html>
