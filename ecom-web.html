<!DOCTYPE html>
<html>
<head>
  <title>Product UI</title>

  <style>

   
    body {
  background: linear-gradient(100deg, #acacdf, #d3b2d7, #aa67e1);
  color: white;
      font-family: Arial;
      margin: 0;
      padding: 20px;
    }

    h2 { margin-bottom: 20px; }

    .top-bar {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    input, select {
      padding: 10px;
      border-radius: 20px;
      border: none;
      margin: 5px 0;
    }

    button {
      background: #d2a2f9;
      border: none;
      padding: 8px 12px;
      border-radius: 20px;
      cursor: pointer;
      color: white;
    }

    .add-btn {
      background: #4d0356;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      box-shadow: #9760c4;
    }

    .card {
      background: #806094;
      padding: 15px;
      width: 230px;
      border-radius: 10px;
      box-shadow: #696ddf;
      border-color: #4d0356;
      border-radius: 5%;
    }

    .btn-group {
      display: flex;
      justify-content: space-between;
      margin-top: 10px;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(213, 177, 241, 0.7);
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: #1e1e1e;
      padding: 20px;
      border-radius: 10px;
      width: 320px;
    }

    .modal-content input {
      width: 100%;
    }

    label {
      font-size: 12px;
    }
  </style>
</head>

<body>

<h1>Products</h1>

<div class="top-bar">
  <input type="text" id="searchInput" placeholder="Search by name">
  <button class="add-btn" onclick="openModal()">+ Add Product</button>
</div>

<div class="container" id="products"></div>

<!-- MODAL -->
<div class="modal" id="productModal">
  <div class="modal-content">
    <h3 id="modalTitle">Add Product</h3>

    <input type="hidden" id="productId">

    <input type="text" id="name" placeholder="Name">
    <input type="text" id="description" placeholder="Description">
    <input type="text" id="brand" placeholder="Brand">
    <input type="number" id="price" placeholder="Price">
    <input type="text" id="category" placeholder="Category">
    <input type="number" id="quantity" placeholder="Quantity">

    <label>Available</label>
    <input type="checkbox" id="available">

    <button onclick="saveProduct()">Save</button>
    <button onclick="closeModal()">Cancel</button>
  <input type="file" id="imageFile">
<button onclick="saveProduct()">Save</button>
<button onclick="closeModal()">Cancel</button>
  </div>
</div>

<script>

const GET_API = "http://localhost:8080/api/products";
const BASE_API = "http://localhost:8080/api/product";

let allProducts = [];

// LOAD
function loadProducts() {
  fetch(GET_API)
    .then(res => res.json())
    .then(data => {
      allProducts = data;
      displayProducts(data);
    });
}
// DISPLAY
function displayProducts(products) {
  const container = document.getElementById("products");
  container.innerHTML = "";

  products.forEach(p => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
     <!-- IMAGE PLACE -->
<div style="width:100%; height:150px; background:#ccc; border-radius:10px; overflow:hidden; margin-bottom:10px;">
  <img src="${p.imageUrl ? 'http://localhost:8080/uploads/' + p.imageUrl : 'https://via.placeholder.com/300x150'}"
     style="width:100%; height:100%; object-fit:cover;">
</div>

      <h3>${p.name}</h3>
      <p>${p.brand}</p>
      <p>${p.description}</p>
      <p>₹ ${p.price}</p>
      <p>Qty: ${p.quantity}</p>
      <p>${p.available ? "In Stock" : "Out of Stock"}</p>

      <div class="btn-group">
        <button onclick="event.stopPropagation(); editProduct(${p.id})">Edit</button>
        <button onclick="event.stopPropagation(); deleteProduct(${p.id})">Delete</button>
      </div>
    `;

    container.appendChild(card);
  });
}

// SEARCH
document.getElementById("searchInput").addEventListener("input", function () {
  const key = this.value.toLowerCase();
  const filtered = allProducts.filter(p =>
    p.name.toLowerCase().includes(key)
  );
  displayProducts(filtered);
});

// OPEN MODAL
function openModal() {
  document.getElementById("modalTitle").innerText = "Add Product";
  document.getElementById("productId").value = "";
  document.querySelectorAll(".modal-content input").forEach(i => {
    if (i.type === "checkbox") i.checked = false;
    else i.value = "";
  });
  document.getElementById("productModal").style.display = "flex";
}
// EDIT
function editProduct(id) {
  const p = allProducts.find(x => x.id === id);

  document.getElementById("modalTitle").innerText = "Update Product";
  document.getElementById("productId").value = p.id;
  document.getElementById("name").value = p.name;
  document.getElementById("description").value = p.description;
  document.getElementById("brand").value = p.brand;
  document.getElementById("price").value = p.price;
  document.getElementById("category").value = p.category;
  document.getElementById("quantity").value = p.quantity;
  document.getElementById("available").checked = p.available;

  document.getElementById("productModal").style.display = "flex";
}

// SAVE (POST + PUT)
function saveProduct() {
  const id = document.getElementById("productId").value;
  const file = document.getElementById("imageFile").files[0];

  // If image selected → upload first
  if (file) {
    const formData = new FormData();
    formData.append("file", file);

    fetch("http://localhost:8080/api/product/upload", {
      method: "POST",
      body: formData
    })
    .then(res => res.text())
    .then(fileName => {
      fileName=fileName.trim();
       console.log("Uploaded file name:", fileName);
      sendProductData(fileName); // send with image
    })
    .catch(err => {
      console.error("Image upload failed", err);
      alert("Image upload failed");
    });

  } else {
    // No image selected
    sendProductData(null);
  }
}


function sendProductData(imageName) {
  const id = document.getElementById("productId").value;

  const product = {
    name: document.getElementById("name").value,
    description: document.getElementById("description").value,
    brand: document.getElementById("brand").value,
    price: parseInt(document.getElementById("price").value),
    category: document.getElementById("category").value,
    quantity: parseInt(document.getElementById("quantity").value),
    available: document.getElementById("available").checked,
    imageUrl: imageName   // 👈 important
  };

  let url = "http://localhost:8080/api/product";
  let method = "POST";

  if (id) {
    url = `http://localhost:8080/api/product/${id}`;
    method = "PUT";
    product.id = id;
  }

  fetch(url, {
    method: method,
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(product)
  })
  .then(res => {
    if (!res.ok) throw new Error("API failed");
    return res.text();
  })
  .then(() => {
    closeModal();
    loadProducts();
  })
  .catch(err => {
    console.error("ERROR:", err);
    alert("Save failed");
  });
}
// DELETE
function deleteProduct(id) {
  fetch(`${BASE_API}/${id}`, { method: "DELETE" })
    .then(() => loadProducts());
}



// CLOSE
function closeModal() {
  document.getElementById("productModal").style.display = "none";
}

// INIT
loadProducts();

</script>

</body>
</html>
